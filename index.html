<!DOCTYPE html>
<html>

<head>    
    <title>Todo List</title>

        <!-- Bootstrap CSS -->   
          <link rel="stylesheet"
              href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> 

           <!-- Font Awesome -->    
            <link rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

            <!-- Custom CSS -->    
             <link rel="stylesheet" href="style.css">
            </head>

    <body>

        <div class="todos-bg-container">        
            <div class="container">            
                <h1 class="todos-heading">Todos</h1>  

                <h2 class="create-task-heading">               
                     Create<span class="create-task-heading-subpart">Task</span>           
                </h2>  

                <input type="text"               
                    id="todoUserInput"               
                    class="todo-user-input" 
                    placeholder="What needs to be done?"> 

                <button class="button" id="addTodoButton">                
                     Add            
                </button>  

                <h2 class="todo-items-heading">               
                     My <span class="todo-items-heading-subpart">Tasks</span>            
                </h2>  

                <ul id="todoItemsContainer" class="todo-items-container"></ul>

                                 
                <button class="button" id="saveTodoButton">                
                                   
                    Save
                                           
                </button>        
                                       
            </div>    
                                    
        </div> 

                                   
        <script src="index.js"></script>
    </body>

</html>
